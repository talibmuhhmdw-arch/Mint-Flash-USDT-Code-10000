    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # عدنا لنسخة أكثر استقراراً لهذه المكتبة

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==1.5.3  # إصدار قديم لكنه الوحيد المتوافق تماماً مع pandas-ta
          pip install requests yfinance
          pip install git+https://github.com/twopirllc/pandas-ta.git # تثبيت النسخة الأحدث من المصدر مباشرة

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
