name: TradingBotRunner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # نستخدم 3.12 لأنها تدعم أحدث نسخ المكتبات المطلوبة

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas-ta requests yfinance

      - name: Run Bot
        run: python main.py

