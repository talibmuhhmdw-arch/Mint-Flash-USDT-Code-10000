name: TradingBotRunner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==1.5.3 requests yfinance
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: "8558351233:AAH24nMPStQ83FtAtK0BFfJ2b9gL5ciQV_g"
          TELEGRAM_CHAT_ID: "8356595702"
        run: python main.py
